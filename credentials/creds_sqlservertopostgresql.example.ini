# Credentials for SQL Server to PostgreSQL
# Copy this file to creds_sqlservertopostgresql.ini and fill in passwords.
# This file is gitignored -- never commit real passwords.

[source]
# host can be overridden here or set in the Add Process form
host     = rmg-sql-2019
port     = 1433
database = rmg_master
username = rmg_etl_web
password = YourSourcePassword

[destination]
# host can be overridden here or set in the Add Process form
host     = localhost
port     = 5433
database = etlcontrol
username = postgres
password = YourDestPassword
