# Credentials for MySQL to SQL Server
# Copy this file to creds_mysqltosqlserver.ini and fill in passwords.
# This file is gitignored -- never commit real passwords.

[source]
# host can be overridden here or set in the Add Process form
host     = localhost
port     = 3306
database = etlcontrol
username = admin
password = YourSourcePassword

[destination]
# host can be overridden here or set in the Add Process form
host     = rmg-sql-2019
port     = 1433
database = rmg_master
username = rmg_etl_web
password = YourDestPassword
